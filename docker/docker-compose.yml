services:
  inventoryhero:
    container_name: inventoryhero
    image: ih:dev
    build:
      context: ../
      target: backend
      dockerfile: ./docker/Dockerfile
    restart: always
    volumes:
      - ih-data:/app/data/
    ports:
      - 8080:8000
    environment:
      IH_REGISTRATION_ALLOWED: "false"
      IH_APP_URL: "http://localhost:8080"

      # SMTP
      IH_SMTP_FROM_NAME: "InventoryHero Team"
      IH_SMTP_HOST: "ih-mail"
      #IH_SMTP_USERNAME=""
      #IH_SMTP_PASSWORD=""
      IH_SMTP_PORT: 1025
      IH_SMTP_FROM_EMAIL: "no-reply@inventory-hero.com"






volumes:
  ih-data:
    driver: local