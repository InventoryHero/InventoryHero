services:
  ih-mail:
    image: axllent/mailpit:latest
    container_name: ih_mail
    restart: no
    environment:
      - "MP_SMTP_AUTH_ACCEPT_ANY=true"
      - "MP_SMTP_AUTH_ALLOW_INSECURE=true"
      - "MP_SMTP_TLS_CERT=sans:localhost"
      - "MP_SMTP_TLS_KEY=sans:localhost"
    ports:
      - "8025:8025"
      - "1026:1025"
  ih-postgres:
    container_name: ih_postgres
    image: postgres:latest
    restart: no
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ih
      POSTGRES_USER: ih
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "ih" ]
      interval: 10s
      retries: 10
  authentik-postgres:
    container_name: authentik_postgres
    image: postgres:latest
    restart: no
    ports:
      - "5431:5432"
    environment:
      POSTGRES_PASSWORD: authentik
      POSTGRES_USER: authentik
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "authentik" ]
      interval: 10s
      retries: 10
  authentik-server:
    container_name: authentik_server
    command: server
    depends_on:
      authentik-postgres:
        condition: service_healthy
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQ__PORT: 5431
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_SECRET_KEY: devsecretkey
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.10.1}
    ports:
    - ${COMPOSE_PORT_HTTP:-9000}:9000
    - ${COMPOSE_PORT_HTTPS:-9443}:9443
    restart: unless-stopped
    volumes:
      - authentik_media:/media
      - authentik_data:/data
  authentik-worker:
    container_name: authentik_worker
    command: worker
    depends_on:
      authentik-postgres:
        condition: service_healthy
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_SECRET_KEY: devsecretkey
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.10.1}
    restart: unless-stopped
    user: root
    volumes:
      - authentik_media:/media
      - authentik_data:/data
volumes:
  authentik_media:
  authentik_data:
  database:
    driver: local
